<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Toscocornici — Il Classico</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f7f0e6;
  --gold: #b8903a;
  --dark: #0e0906;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: pan-y;
}
body {
  background: radial-gradient(ellipse at center, #2a1f0e 0%, #0e0906 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
}
.header {
  position: relative; z-index: 10;
  text-align: center; margin-bottom: 8px;
  flex-shrink: 0;
}
.header h1 {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: clamp(10px, 3vw, 17px);
  font-weight: 400; letter-spacing: 0.4em;
}
.header .sub {
  color: var(--cream); font-size: clamp(8px, 2vw, 11px);
  letter-spacing: 0.25em; opacity: 0.4;
  font-style: italic; margin-top: 2px;
}
.gold-line {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 5px auto;
}
.scene {
  position: relative; z-index: 10;
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  min-height: 0;
}
.book {
  position: relative;
  width: min(98vw, calc(88vh * 2));
  aspect-ratio: 2 / 1;
  display: flex;
  transform-style: preserve-3d;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
}
.spine {
  position: absolute; left: 50%; top: 0;
  transform: translateX(-50%);
  width: 8px; height: 100%;
  background: linear-gradient(90deg, #1a0d05, #7a4820, #c07830, #7a4820, #1a0d05);
  z-index: 30;
  box-shadow: 0 0 20px rgba(0,0,0,1);
}
.half {
  position: absolute;
  width: 50%; height: 100%;
  overflow: hidden;
  background: #f5ede0;
}
.half.left { left: 0; }
.half.right { right: 0; }
.half img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.half.blank { background: #ede5d5; }
.half.left::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to left, rgba(0,0,0,0.2) 0%, transparent 25%);
  pointer-events: none; z-index: 5;
}
.half.right::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.2) 0%, transparent 25%);
  pointer-events: none; z-index: 5;
}
.flip {
  position: absolute;
  width: 50%; height: 100%;
  transform-style: preserve-3d;
  z-index: 20;
  display: none;
}
.flip-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  overflow: hidden;
  background: #f5ede0;
}
.flip-face img { width: 100%; height: 100%; object-fit: cover; display: block; }
.flip-front { transform: rotateY(0deg); }
.flip-back  { transform: rotateY(180deg); }
.flip-front::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.15) 0%, transparent 25%);
  pointer-events: none;
}
.flip-back::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to left, rgba(0,0,0,0.15) 0%, transparent 25%);
  pointer-events: none;
}
.controls {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 20px;
  margin-top: 10px; margin-bottom: 6px;
  flex-shrink: 0;
}
.btn {
  background: none;
  border: 1px solid var(--gold);
  color: var(--gold);
  width: 42px; height: 42px;
  border-radius: 50%;
  cursor: pointer; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s, color 0.2s;
}
.btn:active { background: var(--gold); color: var(--dark); }
.btn:disabled { opacity: 0.2; cursor: not-allowed; }
.counter {
  font-family: 'Cinzel', serif;
  color: var(--cream); font-size: 11px;
  letter-spacing: 0.3em; opacity: 0.5;
  min-width: 80px; text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <div class="gold-line"></div>
  <h1>Toscocornici Porte</h1>
  <p class="sub">Il Classico — Classic Catalogue</p>
  <div class="gold-line"></div>
</div>

<div class="scene">
  <div class="book" id="book">
    <div class="spine"></div>
    <div class="half left" id="pg-left"><img id="img-left" src="" alt=""></div>
    <div class="half right" id="pg-right"><img id="img-right" src="" alt=""></div>
    <div class="flip" id="flip">
      <div class="flip-face flip-front"><img id="flip-f" src="" alt=""></div>
      <div class="flip-face flip-back"><img id="flip-b" src="" alt=""></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn" id="btn-prev" onclick="go(-1)">&#8249;</button>
  <div class="counter" id="counter"></div>
  <button class="btn" id="btn-next" onclick="go(1)">&#8250;</button>
</div>

let cur = 0, busy = false;

function render() {
  const s = SPREADS[cur];
  const lImg = document.getElementById('img-left');
  const rImg = document.getElementById('img-right');
  const lDiv = document.getElementById('pg-left');
  const rDiv = document.getElementById('pg-right');
  if (s.left) { lImg.src = s.left; lDiv.classList.remove('blank'); }
  else { lImg.src = ''; lDiv.classList.add('blank'); }
  if (s.right) { rImg.src = s.right; rDiv.classList.remove('blank'); }
  else { rImg.src = ''; rDiv.classList.add('blank'); }
  document.getElementById('counter').textContent = (cur+1) + ' / ' + SPREADS.length;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === SPREADS.length-1;
}

function go(dir) {
  if (busy) return;
  const next = cur + dir;
  if (next < 0 || next >= SPREADS.length) return;
  busy = true;
  const flip = document.getElementById('flip');
  const ff = document.getElementById('flip-f');
  const fb = document.getElementById('flip-b');
  const ns = SPREADS[next];
  if (dir === 1) {
    flip.style.left = '50%';
    flip.style.transformOrigin = 'left center';
    ff.src = SPREADS[cur].right || '';
    fb.src = ns.left || '';
    document.getElementById('img-right').src = ns.right || '';
    document.getElementById('pg-right').classList.toggle('blank', !ns.right);
    flip.style.display = 'block';
    flip.style.transition = 'none';
    flip.style.transform = 'rotateY(0deg)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      flip.style.transition = 'transform 0.65s cubic-bezier(0.5,0,0.5,1)';
      flip.style.transform = 'rotateY(-180deg)';
    }));
  } else {
    flip.style.left = '0%';
    flip.style.transformOrigin = 'right center';
    ff.src = SPREADS[cur].left || '';
    fb.src = ns.right || '';
    document.getElementById('img-left').src = ns.left || '';
    document.getElementById('pg-left').classList.toggle('blank', !ns.left);
    flip.style.display = 'block';
    flip.style.transition = 'none';
    flip.style.transform = 'rotateY(0deg)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      flip.style.transition = 'transform 0.65s cubic-bezier(0.5,0,0.5,1)';
      flip.style.transform = 'rotateY(180deg)';
    }));
  }
  setTimeout(() => {
    cur = next;
    flip.style.display = 'none';
    flip.style.transition = 'none';
    render();
    busy = false;
  }, 670);
}

// Swipe support for mobile
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive: true});
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) go(diff > 0 ? 1 : -1);
}, {passive: true});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

render();
</script>
